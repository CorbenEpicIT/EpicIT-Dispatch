services:
  backend:
    image: node:20
    container_name: backend
    command: >
      sh -c "npm install &&
             npx prisma generate &&
             if [ \"$$NODE_ENV\" = 'development' ]; then
               npx prisma migrate reset --force &&
               npx tsx prisma/seed.ts;
             else
               npx prisma migrate deploy;
             fi &&
             npm run build &&
             npm run start"
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    networks:
      - hvacnet

  frontend:
    image: node:20-alpine
    container_name: frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    networks:
      - hvacnet

  db:
    image: postgres:16
    container_name: hvac-db
    restart: always
    environment:
      POSTGRES_USER: hvac_user
      POSTGRES_PASSWORD: hvac_pass
      POSTGRES_DB: hvac_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvac_user -d hvac_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hvacnet

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - prometheus_data:/prometheus
    command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--storage.tsdb.retention.time=15d'
    ports:
        - "9090:9090"
    networks:
        - hvacnet
    depends_on:
        backend:
            condition: service_started

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - hvacnet

  promtail-config-init:
    image: alpine:latest
    env_file:
      - ./monitoring/.env
    volumes:
      - ./monitoring/promtail-config.yaml:/template/promtail-config.yaml:ro
      - promtail_config:/output
    command: sh -c "apk add --no-cache gettext && envsubst < /template/promtail-config.yaml > /output/config.yml"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - promtail_config:/etc/promtail:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_started
      promtail-config-init:
        condition: service_completed_successfully
    networks:
      - hvacnet

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - hvacnet


volumes:
  pgdata:
  prometheus_data:
  promtail_config:
  loki_data:
  grafana_data:

networks:
  hvacnet:
    driver: bridge
