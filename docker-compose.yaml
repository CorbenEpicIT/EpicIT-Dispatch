services:
    backend:
        image: node:20
        container_name: backend
        command: >
            sh -c "npm install && 
                   npx prisma generate && 
                   npx prisma migrate reset --force && 
                   npm run build && 
                   npm run start"
        ports:
            - "3000:3000"
        env_file:
            - ./backend/.env
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./backend:/app
        working_dir: /app
        networks:
            - hvacnet

    frontend:
        image: node:20-alpine
        container_name: frontend
        command: sh -c "npm install && npm run dev"
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/app
            - /app/node_modules
        working_dir: /app
        networks:
            - hvacnet

    db:
        image: postgres:16
        container_name: hvac-db
        restart: always
        environment:
            POSTGRES_USER: hvac_user
            POSTGRES_PASSWORD: hvac_pass
            POSTGRES_DB: hvac_db
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U hvac_user -d hvac_db"]
            interval: 5s
            timeout: 5s
            retries: 10
        ports:
            - "5433:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - hvacnet

volumes:
    pgdata:

networks:
    hvacnet:
        driver: bridge
